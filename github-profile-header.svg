<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="240"
  viewBox="0 0 1200 240"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Soham Sarkar</title>
  <desc id="description">Soham Sarkar rendered as a colored ASCII wordmark.</desc>

  <defs>
    <linearGradient id="wordmark-dark" x1="100" y1="0" x2="1100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58a6ff" />
      <stop offset="0.48" stop-color="#c9d1d9" />
      <stop offset="1" stop-color="#79c0ff" />
    </linearGradient>
    <linearGradient id="wordmark-light" x1="100" y1="0" x2="1100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0969da" />
      <stop offset="0.48" stop-color="#24292f" />
      <stop offset="1" stop-color="#218bff" />
    </linearGradient>
  </defs>

  <style>
    .background { fill: #161b22; stroke: #30363d; }
    .wordmark { fill: url(#wordmark-dark); }

    @media (prefers-color-scheme: light) {
      .background { fill: #f6f8fa; stroke: #d0d7de; }
      .wordmark { fill: url(#wordmark-light); }
    }
  </style>

  <rect class="background" x="1" y="1" width="1198" height="238" rx="14" />

  <text
    class="wordmark"
    x="0"
    y="58"
    text-anchor="start"
    xml:space="preserve"
    font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace"
    font-size="22"
    font-weight="600"
    transform="translate(200 0) scale(0.6 1)"
  >
    <tspan x="0" dy="0">   _____       __                       _____            __</tspan>
    <tspan x="0" dy="34">  / ___/____  / /_  ____ _____ ___     / ___/____ ______/ /______ ______</tspan>
    <tspan x="0" dy="34">  \__ \/ __ \/ __ \/ __ `/ __ `__ \    \__ \/ __ `/ ___/ //_/ __ `/ ___/</tspan>
    <tspan x="0" dy="34"> ___/ / /_/ / / / / /_/ / / / / / /   ___/ / /_/ / /  / ,&lt; / /_/ / /</tspan>
    <tspan x="0" dy="34">/____/\____/_/ /_/\__,_/_/ /_/ /_/   /____/\__,_/_/  /_/|_|\__,_/_/</tspan>
  </text>
</svg>
